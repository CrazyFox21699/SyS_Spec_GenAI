# Synthetic examples for scripts/validate_spec.py (not customer data).
testcases:
  - test_id: ST_POW_001
    description: "ACCへ遷移する（補助イグニション成立かつバッテリ電圧が最低動作電圧以上）合成例"
    given: "IGN_AUX == true かつ BATT_VOLTAGE >= 9.0 V（50ms デバウンス後）／合成例"
    expectation: "PowerMode が STANDBY から ACC に遷移し、ACC_ENTRY が true と報告される（合成例）。"
    ir_refs:
      - COND_SAMP_001
  - test_id: ST_POW_002
    description: "エンジン停止後、運転席ドア開で付属品保持を終了する合成例"
    given: "ENGINE_STATE == OFF、DRIVER_DOOR == OPEN／合成例"
    expectation: "RUN/付属品保持状態が解除され、許容される次状態のみに遷移する（合成例）。"
    ir_refs:
      - COND_SAMP_002
  - test_id: ST_POW_003
    description: "CANスリープ抑止が有効な合成例"
    given: "AWAKE_CLIENT_BITMAP != 0／合成例"
    expectation: "NETWORK_SLEEP 要求が許可されず、起動クライアントがゼロになるまで待機する（合成例）。"
    ir_refs:
      - COND_SAMP_003
