- name: CND_REQ_GROUP
  definition: Composite condition group (members defined below)
  group: CND_REQ_GROUP
  source:
    file: edited_Shutoff_Condition_Spec.docx
    paragraph: 10
    kind: group_header
- name: REQ_MAIN_OK
  definition: req.main == TRUE
  group: CND_REQ_GROUP
  source:
    file: edited_Shutoff_Condition_Spec.docx
    paragraph: 12
    kind: code_definition
- name: REQ_SRC_A_VALID
  definition: source == SRC_A && req.auth == PASS
  group: CND_REQ_GROUP
  source:
    file: edited_Shutoff_Condition_Spec.docx
    paragraph: 13
    kind: code_definition
- name: REQ_SRC_B_VALID
  definition: req.source == SRC_B && req.level >= MIN_LEVEL
  group: CND_REQ_GROUP
  source:
    file: edited_Shutoff_Condition_Spec.docx
    paragraph: 14
    kind: code_definition
- name: REQ_STABLE
  definition: remains active until timer >= T_REQ_STABLE
  group: CND_REQ_GROUP
  source:
    file: edited_Shutoff_Condition_Spec.docx
    paragraph: 15
    kind: code_definition
- name: CND_SAFE_GROUP
  definition: Composite condition group (members defined below)
  group: CND_SAFE_GROUP
  source:
    file: edited_Shutoff_Condition_Spec.docx
    paragraph: 16
    kind: group_header
- name: VEHICLE_STOPPED
  definition: Vehicle motion state is zero.
  group: CND_SAFE_GROUP
  source:
    file: edited_Shutoff_Condition_Spec.docx
    paragraph: 18
    kind: word_definition
- name: DRIVER_SAFE
  definition: Operator override is not active.
  group: CND_SAFE_GROUP
  source:
    file: edited_Shutoff_Condition_Spec.docx
    paragraph: 19
    kind: word_definition
- name: PROCESS_IDLE
  definition: Processing state is IDLE.
  group: CND_SAFE_GROUP
  source:
    file: edited_Shutoff_Condition_Spec.docx
    paragraph: 20
    kind: word_definition
- name: PROCESS_PREPARED
  definition: Processing state is PREPARED.
  group: CND_SAFE_GROUP
  source:
    file: edited_Shutoff_Condition_Spec.docx
    paragraph: 21
    kind: word_definition
- name: SAFETY_LOCKED
  definition: Safety interlock is active. The condition line is written as NOT SAFETY_LOCKED.
    The tool must preserve the NOT operator.
  group: CND_SAFE_GROUP
  source:
    file: edited_Shutoff_Condition_Spec.docx
    paragraph: 22
    kind: word_definition
