source_index:
  excel_transitions:
  - id: TR_OFF_ACC
    from_state: 'OFF'
    to_state: ACCESSORY
    event: Accessory request
    raw_condition: 'PWR_REQ_VALID AND IGN_STS=1 AND NOT NOK_SHUTOFF | T_ACC_CONFIRM=250ms
      | PWR_REQ=1; IGN_STS=1 | Diagram: OFF→ACCESSORY'
    diagram_link: 'Diagram: OFF→ACCESSORY'
    source_file: GPT_GenLogic.xlsx
    sheet: Test_Power_State_Spec
    row: 64
    kind: excel_transition_table
  - id: TR_ACC_RUN
    from_state: ACCESSORY
    to_state: RUN
    event: Run request
    raw_condition: 'PWR_REQ_VALID AND GEAR_POS=P AND BATT_OK=1 | T_RUN_CONFIRM=400ms
      | PWR_REQ=1; GEAR_POS=P; BATT_OK=1 | Diagram: ACCESSORY→RUN'
    diagram_link: 'Diagram: ACCESSORY→RUN'
    source_file: GPT_GenLogic.xlsx
    sheet: Test_Power_State_Spec
    row: 65
    kind: excel_transition_table
  - id: TR_RUN_SHUT
    from_state: RUN
    to_state: SHUT_OFF
    event: Shutoff request
    raw_condition: 'SYS_SHUTOFF AND NOT NOK_SHUTOFF | T_SHUT_CONFIRM=300ms | PWR_REQ=1;
      IGN_STS=0; GEAR_POS=P; VEH_SPD=0 | Diagram: RUN→SHUT_OFF'
    diagram_link: 'Diagram: RUN→SHUT_OFF'
    source_file: GPT_GenLogic.xlsx
    sheet: Test_Power_State_Spec
    row: 66
    kind: excel_transition_table
  - id: TR_SHUT_OFF
    from_state: SHUT_OFF
    to_state: 'OFF'
    event: Shutdown complete
    raw_condition: 'RELAY_MAIN feedback = OFF | T_FAIL_TIMEOUT=1000ms | RELAY_MAIN
      feedback=OFF | Diagram: SHUT_OFF→OFF'
    diagram_link: 'Diagram: SHUT_OFF→OFF'
    source_file: GPT_GenLogic.xlsx
    sheet: Test_Power_State_Spec
    row: 67
    kind: excel_transition_table
  - id: TR_FAIL_OFF
    from_state: ANY
    to_state: 'OFF'
    event: Transition failed
    raw_condition: 'T_FAIL_TIMEOUT elapsed OR DIAG_BLOCKED | 1000ms / T_DIAG_FILTER=80ms
      | Inject timeout or diagnostic | Diagram: Any→OFF fallback'
    diagram_link: 'Diagram: Any→OFF fallback'
    source_file: GPT_GenLogic.xlsx
    sheet: Test_Power_State_Spec
    row: 68
    kind: excel_transition_table
  - id: SM_001
    from_state: MODE_STS SHALL NOT BECOME 0 DUE TO TR_PM_001
    to_state: MODE_STS SHALL NOT BECOME 0 DUE TO TR_PM_001
    event: state_transition
    raw_condition: TC_PM_003 | Power Mode Control | Condition B false | Verify shutoff
      is not triggered when vehicle is not stopped | Given Mode_cmd=1, IGN_SW=0, VehicleSpeed>0,
      Battery_OK=1; When T_shutdown>=100ms | Mode_STS shall not become 0 due to TR_PM_001
      | Negative path
    diagram_link: null
    source_file: PM_Behavior_Logic_Sample.xlsx
    sheet: 05_TestSpec_Reference
    row: 4
    kind: excel_transition
  - id: SM_001
    from_state: NORMAL
    to_state: SHUT_OFF
    event: state_transition
    raw_condition: Previous State = NORMAL; Next State = SHUT_OFF
    diagram_link: null
    source_file: Sample_Power_Control_Specification.docx
    sheet: null
    row: 2
    kind: excel_transition
  - id: SM_P_001
    from_state: null
    to_state: null
    event: SHUT_OFF_PERMISSION
    raw_condition: SHUT_OFF_PERMISSION = Condition_E AND Condition_A AND Condition_B
      AND (Condition_C OR Condition_D)
    diagram_link: null
    source_file: Sample_Power_Control_Specification.docx
    sheet: null
    row: null
    kind: paragraph
  - id: SM_P_002
    from_state: null
    to_state: null
    event: RESET_CONDITION
    raw_condition: RESET_CONDITION = Condition_R1 OR Condition_R2 OR Condition_R3
    diagram_link: null
    source_file: Sample_Power_Control_Specification.docx
    sheet: null
    row: null
    kind: paragraph
  - id: SM_LB_001
    from_state: NORMAL
    to_state: SHUT_OFF
    event: logic_table_transition
    raw_condition: Condition_E / Request input active for T_CONFIRM AND Condition_A
      / Vehicle condition = stationary AND Condition_B / Processing state = IDLE AND
      (Condition_C / Communication status = NORMAL OR Condition_D / Backup request
      status = ACTIVE)
