<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ALEX — Spec review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css?v=32" />
</head>
<body>
  <aside id="sidebar" aria-label="Workflow">
    <div class="sidebar-brand">
      <img src="/static/img/toyota-watermark.png" alt="" class="sidebar-brand__mark" width="32" height="24" />
      <h1>ALEX</h1>
    </div>
    <nav id="nav" aria-label="Main steps"></nav>
  </aside>
  <div id="main">
    <header id="topbar" aria-label="Job summary">
      <span class="stat">Job: <b id="job-id">—</b></span>
      <span class="stat">Selected: <b id="stat-selected">0 / 0</b></span>
      <span class="stat">Rows Ready: <b id="stat-ready">—</b></span>
      <span class="stat err">Rows Blocked: <b id="stat-blocked">—</b></span>
      <span class="stat warn">Missing Terms: <b id="stat-missing">—</b></span>
      <span class="stat">Logic Groups: <b id="stat-logic">—</b></span>
      <span class="stat" id="ollama-status-wrap" title="Local Ollama for AI assist">Ollama: <b id="stat-ollama">—</b></span>
    </header>
    <main id="content" role="main"></main>
  </div>
  <script src="/static/js/app.js?v=41"></script>
</body>
</html>
